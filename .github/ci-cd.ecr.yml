name: CI-CD - Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  API_IMAGE_NAME: shopsphere-api
  CLIENT_IMAGE_NAME: shopsphere-client
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API image
        run: |
          docker build \
            -t $DOCKERHUB_USERNAME/$API_IMAGE_NAME:$IMAGE_TAG \
            -t $DOCKERHUB_USERNAME/$API_IMAGE_NAME:latest \
            -f ShopSphere.API/Dockerfile .

      - name: Build Client image
        run: |
          docker build \
            -t $DOCKERHUB_USERNAME/$CLIENT_IMAGE_NAME:$IMAGE_TAG \
            -t $DOCKERHUB_USERNAME/$CLIENT_IMAGE_NAME:latest \
            -f ShopSphere.Client/Dockerfile ShopSphere.Client

      - name: Push API image
        if: github.event_name != 'pull_request'
        run: |
          docker push $DOCKERHUB_USERNAME/$API_IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$API_IMAGE_NAME:latest

      - name: Push Client image
        if: github.event_name != 'pull_request'
        run: |
          docker push $DOCKERHUB_USERNAME/$CLIENT_IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$CLIENT_IMAGE_NAME:latest