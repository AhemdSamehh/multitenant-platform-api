name: CI-CD - Build and Push API to Docker Hub

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ahmedsameho
  API_IMAGE_NAME: abcschool-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show Dockerfiles
        run: |
          pwd
          ls -la
          find . -maxdepth 5 -name "Dockerfile"

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API image
        run: |
          docker build \
            -t $DOCKERHUB_USERNAME/$API_IMAGE_NAME:$IMAGE_TAG \
            -t $DOCKERHUB_USERNAME/$API_IMAGE_NAME:latest \
            -f WebApi/Dockerfile .

      - name: Push API image
        if: github.event_name != 'pull_request'
        run: |
          docker push $DOCKERHUB_USERNAME/$API_IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$API_IMAGE_NAME:latest
