name: CI-CD - Build and Push to Docker Hub

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ahmedsameho
  API_IMAGE_NAME: shopsphere-api
  CLIENT_IMAGE_NAME: shopsphere-client
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la
          echo "Dockerfiles:"
          find . -maxdepth 5 -name "Dockerfile"

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
